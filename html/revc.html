<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" />
    <title>Grand Theft Auto: Vice City</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/reeyuki/YukiVcEmu@c0c21344d59805930e8955ad096caab1bec7ea74/revc/style.css">
</head>

<body data-is-touch="0" data-state-car="0" data-state-car-gun="0" data-state-gun="0" data-state-bike="0"
    data-state-menu="1" data-state-cutscene="0" data-state-mobring="0" data-state-job="0"
    data-state-disable-controls="0" data-state-panzer="0" data-state-car-with-weapon="0"
    data-state-hunter="0" data-state-scope-mode="0" data-state-scope-gun="0">

    <div id="loading-text"
        style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
        Click to play...
    </div>

    <div class="wasted-container" hidden></div>

    <div class="intro-container">
        <div class="loader-container">
            <div class="progress-bar-container" id="spinner">
                <div class="progress-bar-fill"></div>
            </div>
            <div id="status">Downloading...</div>
            <div>
                <progress id="progress"></progress>
            </div>
        </div>
    </div>

    <input type="file" id="original-game-file" hidden>

    <div class="disclaimer">
        <span id="disclaimer-text" class="warning">DISCLAIMER:</span>
        <span class="eula">
            <span id="disclaimer-sources">
                This game is based on an open source version of GTA: Vice City. It is not a commercial release and is
                not affiliated with Rockstar Games.
            </span>
            (<a href="https://github.com/Carter54git/revcdos/blob/main/README.md" target="_blank">github</a>)

            <p id="play-demo-text" class="warning">
                You can play the DEMO version.
            </p>
            <p style="margin-bottom: 0">
                <input type="checkbox" id="disclaimer-checkbox">
                <label id="disclaimer-checkbox-label" for="disclaimer-checkbox">I own the original game</label>
            </p>
        </span>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div class="touch-controls-wrapper">
        <div id="move"></div>
        <div id="look"></div>
        <div class="touch-control radio"></div>
        <div class="touch-control weapon"></div>
        <div class="touch-control menu"></div>
        <div class="touch-control fist"></div>
        <div class="touch-control drift"></div>
        <div class="touch-control run"></div>
        <div class="touch-control car getIn"></div>
        <div class="touch-control left"></div>
        <div class="touch-control right"></div>
        <div class="touch-control jump"></div>
        <div class="touch-control car getOut"></div>
        <div class="touch-control camera"></div>
        <div class="touch-control mobile"></div>
        <div class="touch-control job"></div>
        <div class="touch-control horn"></div>
        <div class="touch-control fireRight"></div>
        <div class="touch-control fireLeft"></div>
    </div>

    <script>
    </script>

    <script>
        const BASE_URL = "https://cdn.jsdelivr.net/gh/reeyuki/YukiVcEmu@c0c21344d59805930e8955ad096caab1bec7ea74/revc/assets/"
        const SCRIPT_BASE_URL = "https://cdn.jsdelivr.net/gh/reeyuki/YukiVcEmu@c0c21344d59805930e8955ad096caab1bec7ea74/revc/"
        const indexWasmUrl = "https://cdn.jsdelivr.net/gh/reeyuki/YukiVcEmu@c0c21344d59805930e8955ad096caab1bec7ea74/revc/index.wasm"
        const loadingText = document.querySelector("#loading-text")
        let loadedBytes = 0
        const DB_NAME = "gameFilesDB"
        const STORE_NAME = "files"

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1)
                request.onupgradeneeded = e => {
                    const db = e.target.result
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME)
                }
                request.onsuccess = e => resolve(e.target.result)
                request.onerror = e => reject(e.target.error)
            })
        }

        async function saveFile(name, buffer) {
            const db = await openDB()
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite")
                const store = tx.objectStore(STORE_NAME)
                store.put(buffer, name)
                tx.oncomplete = () => resolve()
                tx.onerror = e => reject(e.target.error)
            })
        }

        async function getFile(name) {
            const db = await openDB()
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly")
                const store = tx.objectStore(STORE_NAME)
                const request = store.get(name)
                request.onsuccess = e => resolve(e.target.result)
                request.onerror = e => reject(e.target.error)
            })
        }

        async function fetchWithCache(name, url) {
            let cached = await getFile(name)
            if (cached) return cached

            const response = await fetch(BASE_URL + url)
            const reader = response.body.getReader()
            let chunks = []
            let received = 0

            while (true) {
                const { done, value } = await reader.read()
                if (done) break
                received += value.length
                loadedBytes += value.length
                chunks.push(value)
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2)
                loadingText.textContent = "LOADING... " + mbDone + " MB"
            }

            let fullBuffer = new Uint8Array(received)
            let offset = 0
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset)
                offset += chunk.length
            }

            await saveFile(name, fullBuffer.buffer)
            return fullBuffer.buffer
        }

        function getParts(file, start, end) {
            let parts = []
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i)
            return parts
        }

        async function mergeFiles(fileParts, namePrefix) {
            const buffers = []
            for (let i = 0; i < fileParts.length; i++) {
                const buffer = await fetchWithCache(namePrefix + ".part" + (i + 1), fileParts[i])
                buffers.push(buffer)
            }
            const mergedBlob = new Blob(buffers)
            return URL.createObjectURL(mergedBlob)
        }

        Promise.all([
            mergeFiles(getParts("index.data", 1, 7), "index.data"),
            mergeFiles(getParts("audio/emotion.adf", 1, 3), "emotion.adf"),
            mergeFiles(getParts("audio/espant.adf", 1, 3), "espant.adf"),
            mergeFiles(getParts("audio/fever.adf", 1, 3), "fever.adf"),
            mergeFiles(getParts("audio/flash.adf", 1, 3), "flash.adf"),
            mergeFiles(getParts("audio/kchat.adf", 1, 3), "kchat.adf"),
            mergeFiles(getParts("audio/vcpr.adf", 1, 2), "vcpr.adf"),
            mergeFiles(getParts("audio/vrock.adf", 1, 4), "vrock.adf"),
            mergeFiles(getParts("audio/wave.adf", 1, 4), "wave.adf"),
            mergeFiles(getParts("audio/wild.adf", 1, 4), "wild.adf")
        ]).then(([indexdataurl, EMOTION, ESPANT, FEVER, FLASH, KCHAT, VCPR, VROCK, WAVE, WILD]) => {

            const originalFetch = window.fetch
            window.fetch = async function (input, init) {
                let url = input instanceof Request ? input.url : String(input)

                if (url.includes("cdn.dos.zone")) {
                    url = url.split("fetched/").pop().split("cdn.dos.zone/").pop()
                    input = url
                }

                if (url.includes("index.data")) input = indexdataurl
                if (url.includes("index.wasm")) input = indexWasmUrl
                else if (url.includes("emotion.adf")) input = EMOTION
                else if (url.includes("espant.adf")) input = ESPANT
                else if (url.includes("fever.adf")) input = FEVER
                else if (url.includes("flash.adf")) input = FLASH
                else if (url.includes("kchat.adf")) input = KCHAT
                else if (url.includes("vcpr.adf")) input = VCPR
                else if (url.includes("vrock.adf")) input = VROCK
                else if (url.includes("wave.adf")) input = WAVE
                else if (url.includes("wild.adf")) input = WILD
                else if (typeof input === "string" && !input.startsWith("http") && !input.startsWith("blob:") && !input.startsWith("data:")) {
                    input = BASE_URL + input
                }
                console.log("Loading: ", input)
                return originalFetch(input, init)
            }

            const originalOpen = XMLHttpRequest.prototype.open
            XMLHttpRequest.prototype.open = function (method, url, ...rest) {
                if (url.includes("cdn.dos.zone")) {
                    url = url.split("fetched/").pop().split("cdn.dos.zone/").pop()
                }

                if (url.includes("index.data")) url = indexdataurl
                else if (url.includes("emotion.adf")) url = EMOTION
                else if (url.includes("espant.adf")) url = ESPANT
                else if (url.includes("fever.adf")) url = FEVER
                else if (url.includes("flash.adf")) url = FLASH
                else if (url.includes("kchat.adf")) url = KCHAT
                else if (url.includes("vcpr.adf")) url = VCPR
                else if (url.includes("vrock.adf")) url = VROCK
                else if (url.includes("wave.adf")) url = WAVE
                else if (url.includes("wild.adf")) url = WILD
                else if (!url.startsWith("http") && !url.startsWith("blob:") && !url.startsWith("data:")) url = BASE_URL + url

                return originalOpen.call(this, method, url, ...rest)
            }

            ;["gamepademulator.js", "idbfs.js", "game.js"].forEach(src => {
                const s = document.createElement("script")
                s.src = SCRIPT_BASE_URL + src
                document.body.appendChild(s)
            })

            loadingText.remove()
        })
    </script>

</body>

</html>
